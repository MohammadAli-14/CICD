name: Test SSH Connection

on:
  workflow_dispatch:

jobs:
  test-ssh:
    runs-on: ubuntu-latest
    steps:
      - name: Check Secrets Exist
        run: |
          echo "Checking if secrets are set..."
          if [ -z "${{ secrets.VM_IP }}" ]; then echo "VM_IP is NOT set"; else echo "VM_IP is set"; fi
          if [ -z "${{ secrets.VM_USER }}" ]; then echo "VM_USER is NOT set"; else echo "VM_USER is set"; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "SSH_PRIVATE_KEY is NOT set"; else echo "SSH_PRIVATE_KEY is set (length: ${# secrets.SSH_PRIVATE_KEY})"; fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ls -la ~/.ssh/

      - name: Test SSH Verbose
        run: |
          ssh -vvv ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} echo "Success" || exit 1
