name: Deploy to VM

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH Connection
        run: ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} 'echo SSH_OK'

      - name: Deploy Files
        run: |
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/var/www/html' }}"

          # Deploy using rsync (azureuser has write access after chown)
          rsync -avz --progress \
            index.html app.php \
            ${{ secrets.VM_USER }}@${{ secrets.VM_IP }}:$DEPLOY_PATH/

          echo "✓ Files deployed"

      - name: Set Permissions
        run: |
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/var/www/html' }}"
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} <<EOF
            # Set standard web permissions
            sudo chmod 644 $DEPLOY_PATH/*.html $DEPLOY_PATH/*.php 2>/dev/null || chmod 644 $DEPLOY_PATH/*.html $DEPLOY_PATH/*.php
            sudo find $DEPLOY_PATH -type d -exec chmod 755 {} \;
            sudo chown -R www-data:www-data $DEPLOY_PATH 2>/dev/null || sudo chown -R apache:apache $DEPLOY_PATH 2>/dev/null || true
            sudo systemctl reload apache2 2>/dev/null || sudo systemctl reload httpd 2>/dev/null || true
          EOF

      - name: Verify
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "ls -lah ${{ secrets.DEPLOY_PATH || '/var/www/html' }}/"

      - name: Cleanup
        if: always()
        run: rm -rf ~/.ssh
