name: Deploy to VM

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write private key
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Add VM to known hosts
          ssh-keyscan -H ${{ secrets.VM_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

          # SSH config
          cat > ~/.ssh/config <<EOF
          Host ${{ secrets.VM_IP }}
            HostName ${{ secrets.VM_IP }}
            User ${{ secrets.VM_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
            ConnectTimeout=10
            BatchMode=yes
          EOF

          chmod 600 ~/.ssh/config
          ls -la ~/.ssh/

      - name: Test SSH Connection
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} 'echo "SSH OK"'
          echo "✓ SSH connection successful"

      - name: Ensure Remote Directory Exists
        run: |
          echo "Verifying remote directory: ${{ secrets.DEPLOY_PATH || '/var/www/html' }}"
          # After chown azureuser:azureuser on VM, user can write directly
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "mkdir -p ${{ secrets.DEPLOY_PATH || '/var/www/html' }}" || {
            echo "Warning: Directory may already exist or permission issue"
          }

      - name: Deploy Files with Rsync
        run: |
          FILES=("index.html" "app.php")
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/var/www/html' }}"

          # Verify files exist
          for file in "${FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "Found: $file"
            else
              echo "Error: $file not found"
              exit 1
            fi
          done

          echo "Deploying to ${{ secrets.VM_USER }}@${{ secrets.VM_IP }}:$DEPLOY_PATH"

          # Use rsync with sudo on remote side
          rsync -avz --progress \
            --rsync-path="sudo rsync" \
            "${FILES[@]}" \
            ${{ secrets.VM_USER }}@${{ secrets.VM_IP }}:$DEPLOY_PATH/

          echo "✓ Files transferred successfully"

      - name: Set Permissions & Ownership
        run: |
          DEPLOY_PATH="${{ secrets.DEPLOY_PATH || '/var/www/html' }}"
          echo "Setting correct ownership and permissions..."

          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} <<REMOTE
            set -e
            # Set web server ownership (Ubuntu: www-data, CentOS/RHEL: apache)
            sudo chown -R www-data:www-data "$DEPLOY_PATH" 2>/dev/null || \
            sudo chown -R apache:apache "$DEPLOY_PATH" 2>/dev/null || \
            echo "Warning: Could not set web server ownership"

            # File permissions: 644
            sudo find "$DEPLOY_PATH" -type f -name "*.html" -exec chmod 644 {} \;
            sudo find "$DEPLOY_PATH" -type f -name "*.php" -exec chmod 644 {} \;
            sudo find "$DEPLOY_PATH" -type f -name "*.css" -exec chmod 644 {} \;
            sudo find "$DEPLOY_PATH" -type f -name "*.js" -exec chmod 644 {} \;

            # Directory permissions: 755
            sudo find "$DEPLOY_PATH" -type d -exec chmod 755 {} \;

            echo "✓ Permissions set"
          REMOTE

      - name: Verify Deployment
        run: |
          echo "Verifying deployed files..."
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "ls -lah ${{ secrets.DEPLOY_PATH || '/var/www/html' }}/"
          FILE_COUNT=$(ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} "find ${{ secrets.DEPLOY_PATH || '/var/www/html' }} -type f \\( -name '*.html' -o -name '*.php' \\) 2>/dev/null | wc -l")
          echo "Deployed \$FILE_COUNT web file(s)"

      - name: Reload Apache
        if: always()
        run: |
          echo "Reloading Apache..."
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_IP }} <<REMOTE
            set -e
            # Try different service names
            if command -v systemctl &> /dev/null; then
              sudo systemctl reload apache2 2>/dev/null || \
              sudo systemctl reload httpd 2>/dev/null || \
              echo "Note: Could not reload Apache (may need manual restart)"
            else
              sudo apachectl graceful 2>/dev/null || \
              echo "Note: Could not reload Apache"
            fi
          REMOTE

      - name: Deployment Summary
        if: always()
        run: |
          echo "=========================================="
          echo "  DEPLOYMENT COMPLETE"
          echo "=========================================="
          echo "Status:       ${{ job.status }}"
          echo "VM IP:        ${{ secrets.VM_IP }}"
          echo "VM User:      ${{ secrets.VM_USER }}"
          echo "Deploy Path:  ${{ secrets.DEPLOY_PATH || '/var/www/html' }}"
          echo "Commit:       ${{ github.sha }}"
          echo "=========================================="
          echo ""
          echo "→ http://${{ secrets.VM_IP }}/"
          echo "→ http://${{ secrets.VM_IP }}/app.php"
          echo ""

      - name: Cleanup SSH Keys
        if: always()
        run: |
          rm -rf ~/.ssh
          echo "SSH keys cleaned"
